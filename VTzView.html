<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTz | Live Switcher</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --bg-base: #030303;
            --bg-gradient: radial-gradient(circle at top center, #1e3a8a 0%, #030303 100%);
            --panel-bg: rgba(15, 20, 30, 0.6);
            --border-color: rgba(59, 130, 246, 0.15);
            --accent: #3b82f6; 
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #facc15;
        }

        body { font-family: 'Nunito', sans-serif; background-color: var(--bg-base); background-image: var(--bg-gradient); color: #f8fafc; min-height: 100vh; user-select: none;}
        .glass-panel { background: var(--panel-bg); border: 1px solid var(--border-color); backdrop-filter: blur(24px); border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .monitor { background: #000; border: 2px solid rgba(255,255,255,0.1); border-radius: 8px; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; transition: 0.2s;}
        .monitor.prv { border-color: var(--success); box-shadow: 0 0 20px rgba(34, 197, 94, 0.15); }
        .monitor.pgm { border-color: var(--danger); box-shadow: 0 0 30px rgba(239, 68, 68, 0.25); }
        
        .mon-label { position: absolute; top: 0; left: 0; padding: 4px 10px; font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; z-index: 10; border-bottom-right-radius: 6px;}
        .prv .mon-label { background: var(--success); color: #000; }
        .pgm .mon-label { background: var(--danger); color: #fff; }

        .t-bar-container { height: 200px; display: flex; align-items: center; justify-content: center; position: relative; margin: 20px 0;}
        .t-bar-track { width: 8px; height: 100%; background: rgba(255,255,255,0.1); border-radius: 4px; position: relative;}
        .t-bar-handle { width: 60px; height: 24px; background: linear-gradient(to bottom, #f8fafc, #cbd5e1); border-radius: 4px; position: absolute; left: 50%; transform: translateX(-50%); bottom: 0; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.8), inset 0 2px 0 rgba(255,255,255,0.8); border: 1px solid #94a3b8;}

        .cut-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-weight: 800; font-size: 24px; padding: 20px; border-radius: 8px; cursor: pointer; transition: 0.1s; text-transform: uppercase; letter-spacing: 2px;}
        .cut-btn:hover { background: rgba(255,255,255,0.1); }
        .cut-btn:active { transform: scale(0.95); }
        
        .cut-btn.red { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); color: var(--danger); }
        .cut-btn.red:hover { background: var(--danger); color: #fff; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }

        .src-btn { background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.05); color: #94a3b8; padding: 20px 10px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden;}
        .src-btn:hover { border-color: rgba(255,255,255,0.2); color: #fff; }
        .src-btn::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: transparent; }
        
        .src-btn.prv-active { background: rgba(34, 197, 94, 0.1); border-color: var(--success); color: var(--success); }
        .src-btn.prv-active::after { background: var(--success); }
        
        .src-btn.pgm-active { background: rgba(239, 68, 68, 0.1); border-color: var(--danger); color: var(--danger); }
        .src-btn.pgm-active::after { background: var(--danger); }

        .bus-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; margin-bottom: 8px; margin-top: 16px; display: flex; align-items: center; gap: 8px;}
        .bus-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-6">

    <div class="max-w-[1600px] mx-auto flex flex-col gap-6">
        
        <!-- Header -->
        <div class="flex justify-between items-center glass-panel p-5 border-blue-500/30">
            <div>
                <h1 class="text-2xl font-extrabold text-white tracking-wide uppercase">VTz SWITCHER</h1>
                <div class="text-[10px] text-blue-400 tracking-widest uppercase mt-1 font-bold flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse shadow-[0_0_8px_rgba(59,130,246,0.8)]"></span> 
                    LAN Socket Connected (1ms)
                </div>
            </div>
            <div class="flex gap-4 items-center">
                <div class="flex flex-col items-end mr-4">
                    <span class="text-[9px] text-slate-400 uppercase tracking-widest font-bold">Node Target</span>
                    <select class="bg-transparent text-white border border-white/10 rounded px-2 py-1 text-xs outline-none font-bold mono">
                        <option>ALL NODES</option>
                        <option>NODE_01</option>
                        <option>NODE_02</option>
                    </select>
                </div>
                <button class="bg-yellow-500/10 text-yellow-500 border border-yellow-500/30 px-5 py-2.5 rounded-lg text-[11px] font-bold uppercase tracking-wider hover:bg-yellow-500 hover:text-black transition" onclick="releaseToAuto()">Release to VTx Auto</button>
            </div>
        </div>

        <!-- Main Switcher View -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Monitors & Buses -->
            <div class="lg:col-span-9 flex flex-col gap-6">
                <!-- Multi-Viewer -->
                <div class="grid grid-cols-2 gap-6">
                    <div class="monitor prv" id="mon-prv">
                        <div class="mon-label">PREVIEW</div>
                        <span class="mono text-success text-opacity-50 text-2xl font-bold tracking-widest" id="lbl-prv">CAM 1</span>
                    </div>
                    <div class="monitor pgm" id="mon-pgm">
                        <div class="mon-label">PROGRAM</div>
                        <span class="mono text-danger text-opacity-50 text-2xl font-bold tracking-widest" id="lbl-pgm">VT A</span>
                        <div class="absolute top-4 right-4 flex gap-2">
                            <span class="bg-red-500 text-white text-[9px] font-bold px-2 py-1 rounded uppercase tracking-wider animate-pulse">LIVE</span>
                        </div>
                    </div>
                </div>

                <!-- Source Buses -->
                <div class="glass-panel p-6 border-t-2 border-t-slate-700">
                    
                    <div class="bus-label">Program Bus (PGM)</div>
                    <div class="grid grid-cols-8 gap-3" id="bus-pgm">
                        <button class="src-btn pgm-active" onclick="setBus('pgm', 'VT A', this)">VT A</button>
                        <button class="src-btn" onclick="setBus('pgm', 'VT B', this)">VT B</button>
                        <button class="src-btn" onclick="setBus('pgm', 'CAM 1', this)">CAM 1</button>
                        <button class="src-btn" onclick="setBus('pgm', 'CAM 2', this)">CAM 2</button>
                        <button class="src-btn" onclick="setBus('pgm', 'GFX 1', this)">GFX 1</button>
                        <button class="src-btn" onclick="setBus('pgm', 'GFX 2', this)">GFX 2</button>
                        <button class="src-btn" onclick="setBus('pgm', 'BLACK', this)">BLACK</button>
                        <button class="src-btn" onclick="setBus('pgm', 'LOGO', this)">LOGO</button>
                    </div>
                    
                    <div class="bus-label">Preview Bus (PRV)</div>
                    <div class="grid grid-cols-8 gap-3" id="bus-prv">
                        <button class="src-btn" onclick="setBus('prv', 'VT A', this)">VT A</button>
                        <button class="src-btn" onclick="setBus('prv', 'VT B', this)">VT B</button>
                        <button class="src-btn prv-active" onclick="setBus('prv', 'CAM 1', this)">CAM 1</button>
                        <button class="src-btn" onclick="setBus('prv', 'CAM 2', this)">CAM 2</button>
                        <button class="src-btn" onclick="setBus('prv', 'GFX 1', this)">GFX 1</button>
                        <button class="src-btn" onclick="setBus('prv', 'GFX 2', this)">GFX 2</button>
                        <button class="src-btn" onclick="setBus('prv', 'BLACK', this)">BLACK</button>
                        <button class="src-btn" onclick="setBus('prv', 'LOGO', this)">LOGO</button>
                    </div>
                </div>
            </div>

            <!-- Transition Control -->
            <div class="lg:col-span-3 glass-panel p-6 flex flex-col justify-between border-t-2 border-t-slate-700">
                
                <div>
                    <div class="bus-label mt-0 justify-center">Transition Type</div>
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <button class="bg-white/10 text-white py-3 rounded-lg text-xs font-bold uppercase border border-white/20">MIX</button>
                        <button class="bg-transparent text-slate-500 py-3 rounded-lg text-xs font-bold uppercase border border-white/5 hover:text-white transition">WIPE</button>
                        <button class="bg-transparent text-slate-500 py-3 rounded-lg text-xs font-bold uppercase border border-white/5 hover:text-white transition">DIP</button>
                        <button class="bg-transparent text-slate-500 py-3 rounded-lg text-xs font-bold uppercase border border-white/5 hover:text-white transition">DVE</button>
                    </div>
                    <div class="flex justify-between items-center bg-black/40 px-3 py-2 rounded border border-white/5">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Rate (Frames)</span>
                        <input type="number" value="30" class="bg-transparent text-white w-12 text-right outline-none font-bold mono" min="1" max="120">
                    </div>
                </div>

                <div class="t-bar-container" id="t-bar-area">
                    <div class="t-bar-track">
                        <div class="t-bar-handle" id="t-bar" onmousedown="startTBar(event)" ontouchstart="startTBar(event)"></div>
                    </div>
                </div>

                <div class="w-full flex flex-col gap-3">
                    <button class="cut-btn text-blue-400 border-blue-500/30 hover:bg-blue-500/10" onclick="autoTransition()">AUTO</button>
                    <button class="cut-btn red" onclick="hardCut()">CUT</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Global Feedback Toast -->
    <div id="vtz-toast" class="fixed bottom-6 right-6 bg-blue-500 text-white px-6 py-3 rounded-lg font-bold uppercase tracking-wider text-xs shadow-2xl transition-all duration-300 transform translate-y-20 opacity-0 z-[2000]">
        Feedback Message
    </div>

    <script>
        let currentPgm = 'VT A';
        let currentPrv = 'CAM 1';

        function showToast(msg) {
            const toast = document.getElementById('vtz-toast');
            toast.innerText = msg;
            toast.style.transform = 'translateY(0)';
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.transform = 'translateY(20px)';
                toast.style.opacity = '0';
            }, 2000);
        }

        function setBus(bus, source, btnEl) {
            // Update UI buttons
            const container = document.getElementById(`bus-${bus}`);
            const activeClass = bus === 'pgm' ? 'pgm-active' : 'prv-active';
            
            container.querySelectorAll('.src-btn').forEach(btn => btn.classList.remove(activeClass));
            btnEl.classList.add(activeClass);

            // Update Monitors
            if (bus === 'pgm') {
                currentPgm = source;
                document.getElementById('lbl-pgm').innerText = source;
                // In a real app, send socket command here
                console.log(`[SOCKET] PGM SET: ${source}`);
            } else {
                currentPrv = source;
                document.getElementById('lbl-prv').innerText = source;
            }
        }

        function hardCut() {
            // Swap logic
            const temp = currentPgm;
            currentPgm = currentPrv;
            currentPrv = temp;

            // Update Monitors
            document.getElementById('lbl-pgm').innerText = currentPgm;
            document.getElementById('lbl-prv').innerText = currentPrv;

            // Update Bus Buttons
            syncBusButtons();

            // Notify
            console.log(`[SOCKET] CUT EXECUTED. NEW PGM: ${currentPgm}`);
            // Flash screen border to simulate cut
            document.body.style.boxShadow = "inset 0 0 50px rgba(239, 68, 68, 0.2)";
            setTimeout(() => document.body.style.boxShadow = "none", 100);
        }

        function autoTransition() {
            // Simulate a 1 second mix (30 frames)
            console.log(`[SOCKET] AUTO TRANSITION STARTED...`);
            const handle = document.getElementById('t-bar');
            handle.style.transition = 'bottom 1s linear';
            handle.style.bottom = handle.style.bottom === '100%' ? '0%' : '100%';
            
            setTimeout(() => {
                hardCut();
                handle.style.transition = 'none'; // reset
            }, 1000);
        }

        function syncBusButtons() {
            // Program Bus
            const pgmBtns = document.getElementById('bus-pgm').querySelectorAll('.src-btn');
            pgmBtns.forEach(btn => {
                btn.classList.remove('pgm-active');
                if (btn.innerText === currentPgm) btn.classList.add('pgm-active');
            });

            // Preview Bus
            const prvBtns = document.getElementById('bus-prv').querySelectorAll('.src-btn');
            prvBtns.forEach(btn => {
                btn.classList.remove('prv-active');
                if (btn.innerText === currentPrv) btn.classList.add('prv-active');
            });
        }

        function releaseToAuto() {
            showToast("Control released back to VTx Automation Scheduler.");
            console.log("[SOCKET] OVERRIDE RELEASED.");
        }

        // Basic T-Bar Drag Simulation
        let isDragging = false;
        let startY = 0;
        let startBottom = 0;

        function startTBar(e) {
            isDragging = true;
            // Support both mouse and touch
            startY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            const handle = document.getElementById('t-bar');
            startBottom = parseInt(handle.style.bottom || '0');
            
            document.addEventListener('mousemove', dragTBar);
            document.addEventListener('mouseup', stopTBar);
            document.addEventListener('touchmove', dragTBar, {passive: false});
            document.addEventListener('touchend', stopTBar);
        }

        function dragTBar(e) {
            if (!isDragging) return;
            e.preventDefault(); // prevent scrolling while dragging
            
            const currentY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            const deltaY = startY - currentY;
            const containerHeight = 200; // approx track height
            let newBottom = startBottom + (deltaY / containerHeight * 100);
            
            if (newBottom < 0) newBottom = 0;
            if (newBottom > 100) newBottom = 100;
            
            document.getElementById('t-bar').style.bottom = `${newBottom}%`;

            // If it hits the end, execute cut and reset bounds
            if (newBottom === 0 || newBottom === 100) {
                stopTBar();
                hardCut();
            }
        }

        function stopTBar() {
            isDragging = false;
            document.removeEventListener('mousemove', dragTBar);
            document.removeEventListener('mouseup', stopTBar);
            document.removeEventListener('touchmove', dragTBar);
            document.removeEventListener('touchend', stopTBar);
        }
    </script>
</body>
</html>
