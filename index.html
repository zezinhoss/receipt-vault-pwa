<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0'>
    <title>Vault Scanner</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#facc15">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Inter',sans-serif;background:#0a0a0a;background-image:radial-gradient(circle at top right,#2a2a2a 0%,#0a0a0a 60%);color:#fff;padding:20px;display:flex;justify-content:center;align-items:center;min-height:90vh;margin:0}
        .glass-panel{background:rgba(30,30,30,0.5);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:40px 30px;border-radius:24px;border:1px solid rgba(250,204,21,0.15);box-shadow:0 25px 50px rgba(0,0,0,0.5);width:100%;max-width:360px;text-align:center;box-sizing:border-box}
        h3{color:#facc15;font-size:16px;font-weight:600;letter-spacing:2px;margin-top:0;margin-bottom:6px}
        p{color:#888;font-size:13px;font-weight:300;margin-bottom:30px}
        .pin-container{display:flex;gap:12px;justify-content:center;margin-bottom:10px}
        .pin-box{width:50px;height:60px;background:rgba(0, 0, 0, 0.4);border:1px solid rgba(255, 255, 255, 0.1);border-radius:12px;color:#facc15;font-size:24px;text-align:center;outline:none;transition:all 0.3s ease}
        .pin-box:focus{border-color:#facc15;box-shadow:0 0 15px rgba(250, 204, 21, 0.2);background:rgba(0, 0, 0, 0.6)}
        .input-group{display:flex;gap:10px;margin-bottom:25px}
        select{flex:1;appearance:none;background:rgba(0, 0, 0, 0.4);border:1px solid rgba(255, 255, 255, 0.1);border-radius:10px;color:#ddd;padding:14px 12px;font-size:13px;outline:none;transition:border 0.3s ease;text-align:center}
        select:focus{border-color:#facc15;color:#fff}
        .btn{display:block;width:100%;background:transparent;color:#ddd;padding:16px;border-radius:12px;font-size:13px;font-weight:400;letter-spacing:1px;cursor:pointer;border:1px solid rgba(255, 255, 255, 0.1);transition:all 0.3s ease;margin-bottom:12px;box-sizing:border-box;text-transform:uppercase}
        .btn-primary{background:rgba(250, 204, 21, 0.9);color:#000;border:none;font-weight:600}
        .btn:hover {background:rgba(255, 255, 255, 0.05);}
        .btn-primary:hover {background:#facc15;box-shadow:0 0 20px rgba(250, 204, 21, 0.4);}
        input[type='file'] {display: none;}
        #status {margin-top: 20px;font-size: 13px;color: #888;font-weight: 300;}
        .error-text {color: #ef4444!important;}
        .success-text {color: #22c55e!important;}
        .loading-text {color: #facc15!important;}
        .preview-zone img {max-width: 100%;max-height: 160px;margin-top: 15px;border-radius: 8px;display: none;border: 1px solid rgba(255,255,255,0.1);}
    </style>
</head>
<body>
    <div class='glass-panel'>
        <div id='login-view'>
            <h3>SECURE VAULT</h3>
            <p>Restricted Access</p>
            <div class="pin-container" id="pin-container">
                <input type="password" class="pin-box" maxlength="1" inputmode="numeric" autocomplete="off">
                <input type="password" class="pin-box" maxlength="1" inputmode="numeric" autocomplete="off">
                <input type="password" class="pin-box" maxlength="1" inputmode="numeric" autocomplete="off">
                <input type="password" class="pin-box" maxlength="1" inputmode="numeric" autocomplete="off">
            </div>
            <div id='login-status' style='margin-top:15px;color:#ef4444;font-size:13px;'></div>
        </div>
        
        <div id='app-view' style='display:none;'>
            <h3>EXPENSE SCAN</h3>
            <p>Document Ingestion</p>
            <div class="input-group">
                <select id='monthOverride'>
                    <option value='auto'>Auto Month</option>
                    <option value='1'>January</option>
                    <option value='2'>February</option>
                    <option value='3'>March</option>
                    <option value='4'>April</option>
                    <option value='5'>May</option>
                    <option value='6'>June</option>
                    <option value='7'>July</option>
                    <option value='8'>August</option>
                    <option value='9'>September</option>
                    <option value='10'>October</option>
                    <option value='11'>November</option>
                    <option value='12'>December</option>
                </select>
                <select id='payMethod'>
                    <option value='auto'>Auto Routing</option>
                    <option value='bank'>Bank Transfer</option>
                    <option value='cash'>Cash Payment</option>
                </select>
            </div>
            <div id='inputContainer'>
                <label class='btn btn-primary'>Open Camera
                    <input type='file' accept='image/*' capture='environment' onchange='handleFile(this)'>
                </label>
                <label class='btn'>Open Gallery
                    <input type='file' accept='image/*' onchange='handleFile(this)'>
                </label>
            </div>
            
            <div class='preview-zone'>
                <img id='preview' src='' alt='Preview'>
            </div>

            <button id='uploadBtn' class='btn btn-primary' style='display:none;' onclick='triggerUpload()'>Upload to Vault</button>
            <button id='retryBtn' class='btn btn-primary' style='display:none;' onclick='triggerUpload()'>Try Again</button>
            <button id='newBtn' class='btn' style='display:none;' onclick='resetForm()'>Scan Another</button>
            
            <div id='status'>Awaiting Document...</div>
        </div>
    </div>

    <script>
        var cachedBase64='',cachedFullImgSrc='',cachedMimeType='',cachedPin='',cachedForcedMonth='auto',cachedPayMethod='auto';
        var isDigital=false,isCash=false;
        const pinBoxes=document.querySelectorAll('.pin-box');
        
        pinBoxes.forEach((box,index)=>{
            box.addEventListener('input',(e)=>{
                if(box.value.length===1){
                    if(index<pinBoxes.length-1){
                        pinBoxes[index+1].focus();
                    }else{
                        unlockApp();
                    }
                }
            });
            box.addEventListener('keydown',(e)=>{
                if(e.key==='Backspace'&&box.value===''&&index>0){
                    pinBoxes[index-1].focus();
                }
            });
        });

        function unlockApp(){
            var pin=Array.from(pinBoxes).map(b=>b.value).join('');
            if(pin.length<4)return;
            document.getElementById('login-status').innerText='Verifying...';
            document.getElementById('login-status').style.color='#facc15';
            
            // Bypass GAS run logic for testing UI / Share Target in GH Pages.
            cachedPin=pin;
            document.getElementById('login-view').style.display='none';
            document.getElementById('app-view').style.display='block';
        }

        function setStatus(msg,type){
            var el=document.getElementById('status');
            el.innerHTML=msg;
            el.className=type+'-text';
        }

        function handleFile(inputEl){
            if(!inputEl.files.length)return;
            document.getElementById('inputContainer').style.display='none';
            var file=inputEl.files[0];
            var mimeType=file.type;
            setStatus('Compacting asset...','loading');
            
            if(mimeType==='application/pdf'){
                var reader=new FileReader();
                reader.onload=function(e){
                    cachedBase64=e.target.result.split(',')[1];
                    cachedFullImgSrc=e.target.result;
                    cachedMimeType=mimeType;
                    document.getElementById('preview').style.display='none';
                    showUploadState();
                };
                reader.readAsDataURL(file);
            }else{
                var reader=new FileReader();
                reader.onload=function(e){
                    var img=new Image();
                    img.onload=function(){
                        var canvas=document.createElement('canvas');
                        var maxW=2400,maxH=2400,w=img.width,h=img.height;
                        if(w>maxW||h>maxH){
                            if(w>h){h*=maxW/w;w=maxW}
                            else{w*=maxH/h;h=maxH}
                        }
                        canvas.width=w;
                        canvas.height=h;
                        canvas.getContext('2d').drawImage(img,0,0,w,h);
                        var dataUrl=canvas.toDataURL('image/jpeg',0.90);
                        cachedBase64=dataUrl.split(',')[1];
                        cachedFullImgSrc=dataUrl;
                        cachedMimeType='image/jpeg';
                        document.getElementById('preview').src=dataUrl;
                        document.getElementById('preview').style.display='inline-block';
                        showUploadState();
                    };
                    img.onerror=function(){
                        cachedBase64=e.target.result.split(',')[1];
                        cachedFullImgSrc=e.target.result;
                        cachedMimeType=mimeType;
                        showUploadState();
                    };
                    img.src=e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function showUploadState() {
            setStatus('Asset ready. Tag month and hit Upload.', 'success');
            document.getElementById('uploadBtn').style.display = 'block';
            document.getElementById('retryBtn').style.display = 'none';
        }

        function triggerUpload() {
            cachedForcedMonth = document.getElementById('monthOverride').value;
            cachedPayMethod = document.getElementById('payMethod').value;
            
            // Map the dropdown payload to the booleans expected by your backend AI function
            isCash = (cachedPayMethod === 'cash');
            
            document.getElementById('uploadBtn').style.display = 'none';
            document.getElementById('retryBtn').style.display = 'none';
            setStatus('Transmitting to Ledger...', 'loading');
            
            const payload = {
                fileData: cachedBase64, 
                mimeType: cachedMimeType,
                pin: cachedPin,
                month: cachedForcedMonth,
                isDigital: isDigital,
                isCash: isCash
            };

            // YOUR NEW GOOGLE APPS SCRIPT DEPLOYMENT LINK
            const GAS_URL = "https://script.google.com/macros/s/AKfycbwOe50QLqPXQdOglTT5OcT1Y5brzkulfZOZvMH2GPl-TIjFtM3cPTE70tx8rd2qkKrWpw/exec";

            fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(response => response.json()) 
            .then(result => {
                if (result.status === "error") {
                    setStatus('Error: ' + result.error, 'error');
                    document.getElementById('retryBtn').style.display = 'block';
                } else {
                    setStatus('Success!<br>' + result.file, 'success');
                    document.getElementById('newBtn').style.display = 'block';
                }
            })
            .catch(err => {
                console.error(err);
                setStatus('Transmission failed. Check connection.', 'error');
                document.getElementById('retryBtn').style.display = 'block';
            });
        }

        function resetForm(){
            setStatus('Awaiting Document...','');
            document.getElementById('preview').style.display='none';
            document.getElementById('preview').src='';
            document.querySelectorAll('input[type=file]').forEach(i=>i.value='');
            document.getElementById('uploadBtn').style.display='none';
            document.getElementById('retryBtn').style.display='none';
            document.getElementById('newBtn').style.display='none';
            document.getElementById('inputContainer').style.display='block';
        }

        // PWA SERVICE WORKER & SHARE TARGET RECEIVER
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('Vault Service Worker Shield Activated');
                }).catch(err => console.log('SW Registration Failed:', err));
            });
            
            navigator.serviceWorker.addEventListener('message', (event) => {
                if (event.data && event.data.file) {
                    const sharedFile = event.data.file;
                    const dataTransfer = new DataTransfer();
                    dataTransfer.items.add(sharedFile);
                    handleFile({ files: dataTransfer.files });
                }
            });

            if (window.location.search.includes('shared=true')) {
                navigator.serviceWorker.ready.then(reg => {
                    if (navigator.serviceWorker.controller) {
                        navigator.serviceWorker.controller.postMessage({action: 'get-shared-file'});
                    } else {
                        navigator.serviceWorker.addEventListener('controllerchange', () => {
                            navigator.serviceWorker.controller.postMessage({action: 'get-shared-file'});
                        });
                    }
                });
            }
        }
    </script>
</body>
</html>
