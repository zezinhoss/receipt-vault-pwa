<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0'>
    <title>RC Input - Command Center</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#facc15">
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- 🔌 LOAD SUPABASE OFFICIAL SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --theme-primary: #facc15;
            --theme-secondary: #3b82f6;
            --theme-bg-gradient: radial-gradient(circle at top right, #2a2a2a 0%, #0a0a0a 60%);
        }

        .marketing-theme {
            --theme-primary: #c084fc; /* Purple */
            --theme-secondary: #2dd4bf; /* Cyan/Teal */
            --theme-bg-gradient: radial-gradient(circle at top left, #1e1b4b 0%, #0a0a0a 60%);
        }

        body { font-family:'Nunito', sans-serif; background:#0a0a0a; background-image: var(--theme-bg-gradient); color:#fff; padding:20px; display:flex; flex-direction: column; justify-content:center; align-items:center; min-height:90vh; margin:0; transition: all 0.5s ease; overflow-x: hidden;}
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* Remove arrows from number inputs */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* Force dark mode on native browser dropdowns and calendars */
        input[type="date"], select { color-scheme: dark; }
        ::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; opacity: 0.7; transition: 0.2s; }
        ::-webkit-calendar-picker-indicator:hover { opacity: 1; }
        option { background: #1e1e1e; color: #fff; }

        .glass-panel { background:rgba(30,30,30,0.5); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); padding:30px; border-radius:24px; border:1px solid rgba(255,255,255,0.05); box-shadow:0 25px 50px rgba(0,0,0,0.5); text-align:center; box-sizing:border-box; transition: all 0.4s ease; }
        
        #login-wrapper { width:100%; max-width:360px; }
        
        h3 { color: var(--theme-primary); font-size:16px; font-weight:700; letter-spacing:2px; margin-top:0; margin-bottom:6px; display:flex; align-items:center; gap:8px; transition: color 0.4s;}
        p { color:#888; font-size:13px; font-weight:300; margin-bottom:25px; }
        
        .pin-container { display:flex; gap:12px; justify-content:center; margin-bottom:10px; }
        .pin-box { width:50px; height:60px; background:rgba(0, 0, 0, 0.4); border:1px solid rgba(255, 255, 255, 0.1); border-radius:12px; color: var(--theme-primary); font-size:24px; text-align:center; outline:none; transition:all 0.3s ease; font-family:'Nunito', sans-serif; }
        .pin-box:focus { border-color: var(--theme-primary); box-shadow:0 0 15px rgba(250, 204, 21, 0.2); background:rgba(0, 0, 0, 0.6); }
        .marketing-theme .pin-box:focus { box-shadow:0 0 15px rgba(192, 132, 252, 0.2); }

        .main-container { width: 100%; max-width: 1400px; display: none; flex-direction: column; gap: 20px; animation: fadeIn 0.4s ease; padding-left: 80px; box-sizing: border-box; transition: padding-left 0.3s ease;}
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* OS SIDEBAR (NEW DOCK) */
        #os-sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 80px; background: rgba(10, 10, 10, 0.8); border-right: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: none; flex-direction: column; align-items: center; padding: 20px 0; z-index: 9000; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; white-space: nowrap; box-shadow: 10px 0 30px rgba(0,0,0,0.5);}
        #os-sidebar:hover { width: 240px; align-items: flex-start; }
        
        .sidebar-brand { display: flex; align-items: center; padding: 0 20px; margin-bottom: 40px; cursor: pointer; width: 100%; box-sizing: border-box;}
        .sidebar-brand img { width: 40px; height: 40px; object-fit: contain; min-width: 40px;}
        .sidebar-brand span { margin-left: 15px; font-weight: 800; font-size: 14px; color: #fff; letter-spacing: 1px; opacity: 0; transition: opacity 0.2s; }
        #os-sidebar:hover .sidebar-brand span { opacity: 1; transition-delay: 0.1s;}

        .sidebar-item { display: flex; align-items: center; width: 100%; padding: 15px 20px; color: #94a3b8; cursor: pointer; transition: all 0.2s; box-sizing: border-box; position: relative; border-left: 3px solid transparent;}
        .sidebar-item:hover { color: #f8fafc; background: rgba(255,255,255,0.03); }
        .sidebar-item.active { border-left-color: var(--theme-primary); color: var(--theme-primary); background: linear-gradient(90deg, rgba(250, 204, 21, 0.1) 0%, transparent 100%); }
        .marketing-theme .sidebar-item.active { border-left-color: #c084fc; color: #c084fc; background: linear-gradient(90deg, rgba(192, 132, 252, 0.1) 0%, transparent 100%);}
        
        .sidebar-icon { width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; min-width: 40px; border-radius: 10px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease;}
        .sidebar-item:hover .sidebar-icon { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
        .sidebar-label { margin-left: 15px; font-weight: 600; font-size: 13px; opacity: 0; transition: opacity 0.2s; letter-spacing: 0.5px;}
        #os-sidebar:hover .sidebar-label { opacity: 1; transition-delay: 0.1s;}

        /* SPLASH SCREEN (NEW HOME) */
        #os-splash { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100vh; position: relative; padding-left: 80px; box-sizing: border-box; animation: fadeIn 0.8s ease;}
        .splash-logo-bg { position: absolute; width: 60vw; max-width: 800px; opacity: 0.05; pointer-events: none; top: 50%; left: calc(50% + 40px); transform: translate(-50%, -50%); filter: grayscale(100%) contrast(1000%);}
        .splash-content { position: relative; z-index: 10; text-align: center; }
        .splash-manifesto { font-size: 42px; font-weight: 800; letter-spacing: 2px; color: #f8fafc; margin-bottom: 10px; text-transform: uppercase; background: linear-gradient(135deg, #fff 0%, #888 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
        .splash-sub { font-size: 14px; color: #94a3b8; font-weight: 300; letter-spacing: 1px; }

        /* IFRAME APP CONTAINERS */
        .app-iframe-container { width: 100%; height: 90vh; border-radius: 12px; overflow: hidden; background: transparent; }
        .app-iframe-container iframe { width: 100%; height: 100%; border: none; background: transparent; }
        
        /* Enterprise Toast Notification System */
        .toast-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 9999;
            animation: slideUp 0.3s ease forwards;
            font-size: 14px;
            font-weight: 600;
        }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @media (max-width: 768px) {
            body { align-items: flex-start; padding: 15px; }
            .main-container { padding-left: 0; }
            #os-splash { padding-left: 0; }
            #os-sidebar { display: none !important; }
            .splash-logo-bg { left: 50%; }
        }
    </style>
</head>
<body>
    
    <!-- LOGIN SCREEN -->
    <div class='glass-panel' id='login-wrapper'>
        <div id='login-view'>
            <h3 style="justify-content: center;">SECURE VAULT</h3>
            <p id="login-subtitle">Restricted Venue Access</p>
            
            <!-- CLIENT PIN PAD -->
            <div class="pin-container" id="pin-container">
                <input type="password" class="pin-box pin-input" maxlength="1" inputmode="numeric" autocomplete="off">
                <input type="password" class="pin-box pin-input" maxlength="1" inputmode="numeric" autocomplete="off">
                <input type="password" class="pin-box pin-input" maxlength="1" inputmode="numeric" autocomplete="off">
                <input type="password" class="pin-box pin-input" maxlength="1" inputmode="numeric" autocomplete="off">
            </div>

            <!-- ADMIN EMAIL/PASS (Hidden by default) -->
            <div id="admin-container" style="display:none; flex-direction:column; gap:10px; margin-bottom:15px; align-items:center;">
                <input type="email" id="admin-email" placeholder="Staff Email" style="background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#fff; padding:12px; width:90%; box-sizing:border-box; font-family:'Nunito'; outline:none;">
                <input type="password" id="admin-pass" placeholder="Password" style="background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#fff; padding:12px; width:90%; box-sizing:border-box; font-family:'Nunito'; outline:none;">
                <button onclick="attemptAdminLogin()" style="background:var(--theme-primary); color:#000; font-weight:800; border:none; border-radius:8px; padding:12px 20px; cursor:pointer; width:90%; box-sizing:border-box; font-family:'Nunito'; margin-top:5px; transition: 0.2s;">AUTHORIZE</button>
            </div>

            <div id='login-status' style='margin-top:15px;color:#ef4444;font-size:13px;font-weight:bold;height:16px;'></div>

            <!-- TOGGLE BUTTON -->
            <button id="toggle-login-btn" onclick="toggleLoginMode()" style="background:transparent; border:none; color:#888; font-size:10px; text-transform:uppercase; letter-spacing:1px; cursor:pointer; margin-top:15px; transition: 0.2s;">Switch to Internal Staff Login</button>
        </div>
    </div>
    
    <!-- OS SIDEBAR DOCK -->
    <nav id="os-sidebar">
        <div class="sidebar-brand" onclick="returnToHome()">
            <img src="icon.png" alt="RC Logo" style="filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));" onerror="this.style.display='none'">
            <span>COMMAND CENTER</span>
        </div>

        <div class="sidebar-category"><span>Production</span></div>

        <div class="sidebar-item" id="nav-ops" onclick="launchApp('ops')">
            <div class="sidebar-icon" style="color: #10b981;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
            </div>
            <span class="sidebar-label">OPS CORE</span>
        </div>

        <div class="sidebar-item" onclick="showToast('Kinetic Studio OS is currently offline or deploying.')">
            <div class="sidebar-icon" style="color: #f87171;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            </div>
            <span class="sidebar-label">KINETIC</span>
        </div>

        <div class="sidebar-item" id="nav-vtx" onclick="launchApp('vtx')">
            <div class="sidebar-icon" style="color: #facc15;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
            </div>
            <span class="sidebar-label">VTx</span>
        </div>

        <div class="sidebar-item" id="nav-vtz" onclick="launchApp('vtz')">
            <div class="sidebar-icon" style="color: #3b82f6;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            </div>
            <span class="sidebar-label">VTz</span>
        </div>

        <div class="sidebar-category"><span>Marketing</span></div>

        <div class="sidebar-item" id="nav-noiz" onclick="launchApp('noiz')">
            <div class="sidebar-icon" style="color: #c084fc;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
            </div>
            <span class="sidebar-label">NOIZ</span>
        </div>

        <div class="sidebar-category"><span>Finance</span></div>

        <div class="sidebar-item" id="nav-vault" onclick="launchApp('vault')">
            <div class="sidebar-icon" style="color: #facc15;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            </div>
            <span class="sidebar-label">VAULT</span>
        </div>
    </nav>

    <!-- NEW SPLASH SCREEN -->
    <div id="os-splash">
        <img src="icon.png" alt="Ghost Logo" class="splash-logo-bg" onerror="this.style.display='none'">
        <div class="splash-content">
            <div class="splash-manifesto">Production. Marketing. Finance.</div>
            <div class="splash-sub">Select an operational environment to launch.</div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- APP VIEW CONTAINER (Holds all active apps) -->
    <!-- ========================================== -->
    <div id='app-view' class="main-container">
        
        <!-- OPS CORE APP VIEW -->
        <div id="ops-core" class="app-iframe-container" style="display:none;">
            <iframe src="OpsView.html" title="Ops Core"></iframe>
        </div>

        <!-- VTx APP VIEW -->
        <div id="vtx-core" class="app-iframe-container" style="display:none;">
            <iframe src="VTxView.html" title="VTx Scheduler"></iframe>
        </div>

        <!-- VTz APP VIEW -->
        <div id="vtz-core" class="app-iframe-container" style="display:none;">
            <iframe src="VTzView.html" title="VTz Switcher"></iframe>
        </div>

        <!-- NOIZ APP VIEW -->
        <div id="noiz-core" class="app-iframe-container" style="display:none;">
            <iframe src="NoizView.html" title="Noiz Core"></iframe>
        </div>

        <!-- VAULT APP VIEW -->
        <div id="vault-core" class="app-iframe-container" style="display:none;">
            <iframe src="VaultView.html" title="Financial Vault"></iframe>
        </div>

    </div>

    <script>
        // =========================================================================
        // 🔒 SUPABASE ENTERPRISE DATABASE INITIALIZATION
        // =========================================================================
        const SUPABASE_URL = "https://neubhkdyxkidegndrpow.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_twN5jze3Q3GogLjmWxVGGg_xSqOvKpT";

        // Create the global database connection object
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        var currentActiveApp = null;
        var currentPin = "";

        // --- ENTERPRISE TOAST ALERTS (Replacing default browser alerts) ---
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(100px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- PIN PAD LOGIC & API FETCH ---
        const pinInputs = document.querySelectorAll('.pin-input');
        
        // Focus the first box on load
        window.onload = function() {
            if(pinInputs.length > 0) pinInputs[0].focus();
        };

        pinInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                // Auto-advance to next box
                if(e.target.value.length === 1 && index < pinInputs.length - 1) {
                    pinInputs[index + 1].focus();
                }
                // If all 4 are filled, trigger login
                if(Array.from(pinInputs).every(inp => inp.value.length === 1)) {
                    attemptClientLogin();
                }
            });
            // Handle backspace properly
            input.addEventListener('keydown', (e) => {
                if(e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    pinInputs[index - 1].focus();
                }
            });
        });

        function getEnteredPin() {
            return Array.from(pinInputs).map(inp => inp.value).join('');
        }

        /**
         * Verifies a 4-digit venue PIN against active client access in Supabase
         */
        async function attemptClientLogin() {
            const enteredPin = getEnteredPin();
            const statusEl = document.getElementById('login-status');
            
            statusEl.innerText = "Querying Live Database...";
            statusEl.style.color = "#facc15";

            // Prevent typing while loading
            pinInputs.forEach(inp => inp.classList.add('opacity-50', 'pointer-events-none'));

            try {
                const currentTime = new Date().toISOString();

                // 📡 SUPABASE QUERY: Select an active event matching this PIN
                const { data: venue, error } = await supabase
                    .from('client_access')
                    .select('id, venue_name, expires_at')
                    .eq('pin', enteredPin)
                    .eq('is_active', true)
                    .gt('expires_at', currentTime)
                    .maybeSingle();

                pinInputs.forEach(inp => inp.classList.remove('opacity-50', 'pointer-events-none'));

                if (error) {
                    throw error;
                }

                if (venue) {
                    // Success! Save session info.
                    currentPin = enteredPin;
                    localStorage.setItem("active_client_id", venue.id);
                    localStorage.setItem("active_venue_name", venue.venue_name);
                    
                    // Clients only get access to specific production modules
                    unlockApp(['vtx', 'vtz', 'vault']); 
                } else {
                    // Fail State
                    statusEl.innerText = "Access Denied. Invalid or Expired PIN.";
                    statusEl.style.color = "#ef4444";
                    pinInputs.forEach(inp => inp.value = ''); 
                    pinInputs[0].focus(); 
                }

            } catch (err) {
                pinInputs.forEach(inp => inp.classList.remove('opacity-50', 'pointer-events-none'));
                statusEl.innerText = "Database Connection Error.";
                statusEl.style.color = "#ef4444";
                console.error("Supabase Error:", err.message);
            }
        }

        // --- ADMIN LOGIN LOGIC ---
        let isAdminMode = false;
        
        function toggleLoginMode() {
            isAdminMode = !isAdminMode;
            document.getElementById('pin-container').style.display = isAdminMode ? 'none' : 'flex';
            document.getElementById('admin-container').style.display = isAdminMode ? 'flex' : 'none';
            document.getElementById('login-subtitle').innerText = isAdminMode ? "Internal Staff Portal" : "Restricted Venue Access";
            document.getElementById('toggle-login-btn').innerText = isAdminMode ? "Switch to Venue PIN Access" : "Switch to Internal Staff Login";
            document.getElementById('login-status').innerText = ""; // Clear errors
        }

        /**
         * Verifies Staff credentials against Supabase Auth Engine
         */
        async function attemptAdminLogin() {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;
            const statusEl = document.getElementById('login-status');
            
            if(!email || !pass) {
                statusEl.innerText = "Email and Password required.";
                return;
            }

            statusEl.innerText = "Authenticating with Postgres Auth...";
            statusEl.style.color = "#facc15";

            try {
                // 📡 SUPABASE AUTH: Validate User Credentials
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: pass
                });

                if (error) {
                    throw error;
                }

                if (data.session) {
                    // Staff get access to the entire OS
                    unlockApp(['ops', 'vtx', 'vtz', 'noiz', 'vault']);
                }

            } catch (err) {
                statusEl.innerText = err.message || "Access Denied.";
                statusEl.style.color = "#ef4444";
                console.error("Auth Error:", err);
            }
        }

        // --- OS UNLOCK LOGIC ---
        function unlockApp(allowedApps) {
            document.getElementById('login-wrapper').style.display = 'none';
            document.getElementById('os-sidebar').style.display = 'flex';
            document.getElementById('os-splash').style.display = 'flex';
            document.body.style.alignItems = 'center';
            document.body.style.justifyContent = 'center';

            // Hide nav items that the user doesn't have permission for
            if (allowedApps) {
                document.querySelectorAll('.sidebar-item').forEach(item => {
                    const appId = item.id.replace('nav-', '');
                    if (allowedApps.includes(appId)) {
                        item.style.display = 'flex';
                    } else {
                        item.style.display = 'none';
                    }
                });
            }
        }

        // --- OS ROUTING LOGIC ---
        function launchApp(appId) {
            if(currentActiveApp === appId) return;
            currentActiveApp = appId;
            
            var splash = document.getElementById('os-splash');
            var appView = document.getElementById('app-view');
            var ops = document.getElementById('ops-core');
            var vtx = document.getElementById('vtx-core');
            var vtz = document.getElementById('vtz-core');
            var noiz = document.getElementById('noiz-core');
            var vault = document.getElementById('vault-core');
            var body = document.body;

            // Manage Nav Active States
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            if(document.getElementById('nav-' + appId)) {
                document.getElementById('nav-' + appId).classList.add('active');
            }

            splash.style.display = 'none';
            appView.style.display = 'flex';
            
            // Keep horizontally centered, but start from the top vertically
            body.style.alignItems = 'center';
            body.style.justifyContent = 'flex-start';

            // Hide all apps first
            ops.style.display = 'none';
            vtx.style.display = 'none';
            vtz.style.display = 'none';
            noiz.style.display = 'none';
            vault.style.display = 'none';
            body.classList.remove('marketing-theme');
            
            // Set dynamic theme colors based on app
            if (appId === 'ops') {
                document.documentElement.style.setProperty('--theme-primary', '#10b981');
                document.documentElement.style.setProperty('--theme-bg-gradient', 'radial-gradient(circle at top center, #022c22 0%, #0a0a0a 60%)');
                ops.style.display = 'block';
            } else if (appId === 'vtx') {
                document.documentElement.style.setProperty('--theme-primary', '#facc15');
                document.documentElement.style.setProperty('--theme-bg-gradient', 'radial-gradient(circle at top right, #2a2a2a 0%, #0a0a0a 60%)');
                vtx.style.display = 'block';
            } else if (appId === 'vtz') {
                document.documentElement.style.setProperty('--theme-primary', '#3b82f6');
                document.documentElement.style.setProperty('--theme-bg-gradient', 'radial-gradient(circle at top left, #1e3a8a 0%, #0a0a0a 60%)');
                vtz.style.display = 'block';
            } else if (appId === 'noiz') {
                body.classList.add('marketing-theme');
                noiz.style.display = 'block';
            } else if (appId === 'vault') {
                document.documentElement.style.setProperty('--theme-primary', '#facc15');
                document.documentElement.style.setProperty('--theme-bg-gradient', 'radial-gradient(circle at top right, #2a2a2a 0%, #0a0a0a 60%)');
                vault.style.display = 'block';
                if(typeof initPlaceholderGraph === 'function') {
                    initPlaceholderGraph();
                }
            }
        }

        function returnToHome() {
            var splash = document.getElementById('os-splash');
            var appView = document.getElementById('app-view');
            var body = document.body;

            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));

            appView.style.display = 'none';
            splash.style.display = 'flex';
            body.classList.remove('marketing-theme');
            document.documentElement.style.setProperty('--theme-primary', '#facc15');
            document.documentElement.style.setProperty('--theme-bg-gradient', 'radial-gradient(circle at top right, #2a2a2a 0%, #0a0a0a 60%)');
            
            // Return to dead center for the OS Launcher
            body.style.alignItems = 'center';
            body.style.justifyContent = 'center';
            currentActiveApp = null;
        }

    </script>
</body>
</html>
